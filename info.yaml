# Tiny Tapeout project information
project:
  title:        "ECC Scalar Accelerator"     # Project title
  author:       "PM LIKHITH KUMAR AND PRAJWAL T"      # Your name
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Simplified ECC accelerator using Verilog HDL for ASIC implementation"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     0       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 340x160 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 3x4 or 4x4

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_ecc_accelerator"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "Input A bit 0"
  ui[1]: "Input A bit 1"
  ui[2]: "Input A bit 2"
  ui[3]: "Input A bit 3"
  ui[4]: "Input A bit 4"
  ui[5]: "Input A bit 5"
  ui[6]: "Input A bit 6"
  ui[7]: "Input A bit 7"

  # Outputs
  uo[0]: "ECC output bit 0"
  uo[1]: "ECC output bit 1"
  uo[2]: "ECC output bit 2"
  uo[3]: "ECC output bit 3"
  uo[4]: "ECC output bit 4"
  uo[5]: "ECC output bit 5"
  uo[6]: "ECC output bit 6"
  uo[7]: "ECC output bit 7"

  # Bidirectional pins used as B inputs
  uio[0]: "Input B bit 0"
  uio[1]: "Input B bit 1"
  uio[2]: "Input B bit 2"
  uio[3]: "Input B bit 3"
  uio[4]: "Input B bit 4"
  uio[5]: "Input B bit 5"
  uio[6]: "Input B bit 6"
  uio[7]: "Input B bit 7"

# Do not change!
yaml_version: 6
